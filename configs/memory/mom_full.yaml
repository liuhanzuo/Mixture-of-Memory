# MoM 完整记忆系统配置
# 组合 L1 + L2 + L3 的完整 Mixture-of-Memory 配置

defaults:
  - l1_assoc
  - l2_episode
  - l3_profile

# 全局调度器配置
scheduler:
  # L1: 同步在线更新
  l1_sync: true
  l1_update_on: "token_step"      # 每个 token step 更新 L1
  
  # L2: 异步 chunk/turn 边界更新
  l2_sync: false
  l2_update_on: "turn_end"        # 在 turn 结束时触发 L2 聚合
  l2_chunk_size: 5                # 每 5 轮做一次 chunk 聚合
  
  # L3: 异步 session 结束更新
  l3_sync: false
  l3_update_on: "session_end"     # 在 session 结束时触发 L3 摘要
  
  # 记忆读取优先级
  read_priority:
    - "l2"    # 优先检索 L2 episodic 记忆
    - "l3"    # 其次检索 L3 profile 记忆
    - "l1"    # L1 通过门控直接融合，不走检索

  # 上下文预算
  context_budget:
    max_memory_tokens: 512        # 记忆注入最大 token 数
    l2_token_ratio: 0.6           # L2 占比
    l3_token_ratio: 0.4           # L3 占比
