# ============================================================
# 合成数据集配置
# ============================================================
defaults:
  - base

synthetic:
  num_entities: 50              # 实体数量
  num_attributes: 20            # 属性数量
  num_distractors: 10           # 每个样本的干扰句数
  block_length: 256             # 样本总长度（token 数）
  train_size: 5000
  val_size: 500
  test_size: 500
  task_types:                   # 启用的任务类型
    - "simple_recall"
    - "updated_preference"
    - "past_value_query"
    - "long_distance_recall"
    - "distractor_heavy"
  seed: 42
