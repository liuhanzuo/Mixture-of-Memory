# Full Attention Qwen 模型配置
# 用作上界基准（upper-bound baseline）

backbone:
  type: "full_attention"
  model_name_or_path: "Qwen/Qwen2.5-1.5B"
  dtype: "bfloat16"
  device: "cuda"

  # Full Attention 参数
  full_attention:
    use_flash_attention: true
    max_position_embeddings: 32768  # 全量上下文长度

  # 生成参数
  generation:
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    do_sample: true

  # 隐藏层维度
  hidden_size: 1536
  num_heads: 12
  head_dim: 128
